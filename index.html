<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>同步紀錄</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f4f6fb; }
    h1 { color: #1a2540; }
    table { border-collapse: collapse; width: 100%; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #1a2540; color: #fff; padding: 10px 14px; text-align: left; }
    td { padding: 10px 14px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f4ff; }
  </style>
</head>
<body>
  <h1>資料同步紀錄</h1>
  <table>
    <thead>
      <tr>
        <th>日期</th>
        <th>資料夾名稱</th>
        <th>單位</th>
        <th>負責人</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>2026/03/30</td>
        <td>0330</td>
        <td>數位賦能式</td>
        <td>莊旻翰</td>
      </tr>
      <tr>
        <td>2026/04/01</td>
        <td>0401</td>
        <td>數位賦能室</td>
        <td>江如玉</td>
      </tr>
      <tr>
        <td>2026/04/01</td>
        <td>他說他要睡瞭</td>
        <td>數位賦能室</td>
        <td>江如玉</td>
      </tr>
      <!-- LOG -->
    </tbody>
  </table>
</body>
</html>
