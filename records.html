<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>賠償案件紀錄</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f4f6fb; }
    h1 { color: #1a2540; }
    table { border-collapse: collapse; width: 100%; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #1a2540; color: #fff; padding: 10px 14px; text-align: left; }
    td { padding: 10px 14px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f4ff; }
    .status-done   { color: #2e7d32; font-weight: bold; }
    .status-proc   { color: #e65100; font-weight: bold; }
    .status-wait   { color: #6a1b9a; font-weight: bold; }
  </style>
</head>
<body>
  <h1>賠償案件紀錄</h1>
  <p id="updated"></p>
  <table>
    <thead>
      <tr>
        <th>案件編號</th>
        <th>賠償單位</th>
        <th>賠償原因</th>
        <th>狀態</th>
        <th>負責人</th>
        <th>賠償金額</th>
        <th>申請日期</th>
        <th>結案日期</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>CL-10040</td>
        <td>台南倉</td>
        <td>包裝問題</td>
        <td class="status-done">已結案</td>
        <td>張淑芬</td>
        <td>NT$ 920</td>
        <td>2025/3/10</td>
        <td>2025/3/28</td>
      </tr>
      <!-- RECORDS -->
    </tbody>
  </table>
  <script>
    document.getElementById('updated').textContent = '最後更新：' + document.lastModified;
  </script>
</body>
</html>
